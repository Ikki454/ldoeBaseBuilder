<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  
  <title>LDOE Base Builder</title>

  <link rel="stylesheet" href="index.css">
  <script type="module" src="index.js"></script>
</head>
<body>
    <header>
        <h1>LDOE Base Builder</h1>
    </header>
    <main>
        <div class="panel-grid">
            <div class="panel building-panel">
                <div class="panel-header">
                    <h2>building</h2>
                    <div class="dropdown">
                        <button id="dropdown-btn" class="btn"> Sort by </button>
                        <div class="dropdown-content">
                            <button id="all" class="b-dropdown-btn">All</button>
                            <button id="structure" class="b-dropdown-btn">Structure</button>
                            <button id="storage" class="b-dropdown-btn">Storage</button>
                            <button id="workbench" class="b-dropdown-btn">Workbench</button>
                            <button id="other" class="b-dropdown-btn">Other</button>
                            <button id="special" class="b-dropdown-btn">Special</button>
                        </div>
                    </div>
                </div>
                <div class="building-grid">
                    <!-- cellule générée dynamiquement -->
                    <!-- exemple de cellule
                    <div class="building-cell">
                        <img src="image/building/wood_wall.png" alt="wood wall">
                        <p>building name</p>
                    </div>
                    -->
                </div>
            </div>

            <div class="panel base-plan-panel">
                <div class="base-grid">
                    <!-- cellule générée dynamiquement -->
                    <!-- exemple de cellule
                        <button class="base-cell"></button>
                    -->
                </div>
            </div>

            <div class="panel ressource-panel">
                <div class="panel-header">
                    <h2>ressource list</h2>
                    <div class="dropdown">
                        <button id="dropdown-btn" class="btn"> Clear </button>
                        <div class="dropdown-content">
                            <button id="del-base-plan" class="c-dropdown-btn">clear base</button>
                            <button id="del-ressources" class="c-dropdown-btn">reset ressources</button>
                            <button id="enable-buildings" class="c-dropdown-btn">enable buildings</button>
                            <button id="enable-props" class="c-dropdown-btn">enable props</button>
                        </div>
                    </div>
                    
                    <div class="dropdown">
                        <button id="dropdown-btn" class="btn"> Sort by </button>
                        <div class="dropdown-content">
                            <button id="''" class="r-dropdown-btn">All</button>
                            <button id="quantity-asc" class="r-dropdown-btn">Ascending</button>
                            <button id="quantity-desc" class="r-dropdown-btn">Descending</button>
                            <button id="name-asc" class="r-dropdown-btn">A To Z</button>
                            <button id="name-desc" class="r-dropdown-btn">Z To A</button>
                        </div>
                    </div>
                    
                </div>
                <ul class="ressource-list">
                    <!-- <li>
                            <div>
                                <img src="images/ressources/pine_log.webp" alt="wood log">
                                <p>wood log</p>
                            </div>
                            <p>x10</p>
                        </li>
                    -->
                </ul>
            </div>
        </div>
    </main>
</body>
</html>
